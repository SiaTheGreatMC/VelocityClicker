<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Velocity Clicker</title>

<style>
body{
margin:0;
background:#000;
color:#87CEEB;
font-family:Arial;
text-align:center;
overflow:hidden;
}

/* 🌌 LOADING SCREEN */
#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:999;
}

.loader{
width:50px;
height:50px;
border:4px solid #222;
border-top:4px solid #87CEEB;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

#bar{
width:200px;
height:10px;
background:#222;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

#barFill{
height:100%;
width:0%;
background:#87CEEB;
transition:0.2s;
}

/* GAME */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.card{
background:rgba(20,20,20,0.85);
border-radius:18px;
padding:12px;
margin:10px auto;
width:340px;
}

button{
border:none;
border-radius:14px;
padding:10px 14px;
margin:5px;
background:#111;
color:#87CEEB;
cursor:pointer;
transition:0.2s;
}
button:hover{
transform:scale(1.05);
box-shadow:0 0 10px #87CEEB;
}

#clickBtn{
font-size:20px;
padding:18px 26px;
}
</style>
</head>

<body>

<!-- 🌌 LOADING -->
<div id="loading">
<h2>⚡ Loading Velocity Clicker</h2>
<div class="loader"></div>
<div id="loadText">Initializing...</div>
<div id="bar"><div id="barFill"></div></div>
</div>

<!-- GAME -->
<canvas id="bg"></canvas>

<h2>⚡ Velocity Clicker</h2>

<div class="card">
<div id="power">Power: 0</div>
<div>Income/sec: <span id="income">0</span></div>
<div>Multiplier: x<span id="mult">1</span></div>
<div>Prestige: x<span id="prestige">1</span></div>

<button id="clickBtn">CLICK ⚡</button>
</div>

<div class="card">
<h3>🛒 Shop</h3>

<button onclick="buyMult()">Buy x2 Mult (Cost: 100)</button>
<button onclick="buyFactory()">🏭 Factory (Cost: 250)</button>
<button onclick="buyReactor()">⚛ Reactor (Cost: 2000)</button>
</div>

<div class="card">
<h3>🎮 Prestige</h3>
<button onclick="prestige()">🔥 Rebirth</button>
</div>

<script>

/* ===== LOADING SYSTEM ===== */
let progress=0;
let messages=["Booting engine...","Loading factories...","Charging reactors...","Finalizing universe..."];

let loader=setInterval(()=>{
progress+=5;
barFill.style.width=progress+"%";

if(progress<25) loadText.innerText=messages[0];
else if(progress<50) loadText.innerText=messages[1];
else if(progress<75) loadText.innerText=messages[2];
else loadText.innerText=messages[3];

if(progress>=100){
clearInterval(loader);
loading.style.display="none";
}
},80);

/* ===== STATE ===== */
let state={
power:0,
mult:1,
factory:0,
reactor:0,
prestige:1
};

let cost={mult:100,factory:250,reactor:2000};

/* ===== CLICK ===== */
clickBtn.onclick=()=>{
state.power += 1 * state.mult * state.prestige;
update();
};

/* ===== SHOP ===== */
function buyMult(){
if(state.power>=cost.mult){
state.power-=cost.mult;
state.mult*=2;
cost.mult*=2;
update();
}
}

function buyFactory(){
if(state.power>=cost.factory){
state.power-=cost.factory;
state.factory++;
update();
}
}

function buyReactor(){
if(state.power>=cost.reactor){
state.power-=cost.reactor;
state.reactor++;
update();
}
}

/* ===== IDLE ===== */
setInterval(()=>{
state.power +=
(state.factory*5 + state.reactor*25)
* state.mult * state.prestige;

update();
},1000);

/* ===== PRESTIGE ===== */
function prestige(){
if(state.power < 5000) return;

state={
power:0,
mult:1,
factory:0,
reactor:0,
prestige:state.prestige+1
};

update();
}

/* ===== UPDATE ===== */
function update(){

powerEl.innerText="Power: "+Math.floor(state.power);

incomeEl.innerText=
(state.factory*5 + state.reactor*25)
* state.mult * state.prestige;

multEl.innerText=state.mult;
prestigeEl.innerText=state.prestige;

save();
}

/* ===== SAVE ===== */
function save(){
localStorage.setItem("velocity_clicker",JSON.stringify(state));
}

function load(){
let data=localStorage.getItem("velocity_clicker");
if(data) state=JSON.parse(data);
}

/* ===== STAR BACKGROUND ===== */
let c=bg.getContext("2d");
bg.width=innerWidth;
bg.height=innerHeight;

let stars=Array(120).fill().map(()=>({
x:Math.random()*bg.width,
y:Math.random()*bg.height
}));

function draw(){
c.clearRect(0,0,bg.width,bg.height);
c.fillStyle="#87CEEB";

stars.forEach(s=>{
c.fillRect(s.x,s.y,2,2);
s.y+=0.3;
if(s.y>bg.height)s.y=0;
});

requestAnimationFrame(draw);
}
draw();

/* ===== DOM ===== */
const powerEl=document.getElementById("power");
const incomeEl=document.getElementById("income");
const multEl=document.getElementById("mult");
const prestigeEl=document.getElementById("prestige");

/* ===== INIT ===== */
load();
update();

</script>

</body>
</html>
